<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voyage en Chine · Dashboard Aurora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#ECEAF3;min-height:100vh;padding:1rem;}
  button{font-family:inherit;}
  .om-scroll::-webkit-scrollbar{width:8px;height:8px;}
  .om-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:8px;}

  /* ---- theme tokens (set on .app) ---- */
  .app{
    --side-bg: linear-gradient(180deg,#FF5A5F 0%,#FF7A6B 42%,#7C3AED 100%);
    --side-sub: rgba(255,255,255,.78);
    --logo-color:#fff;
    --nav-active-bg:#ffffff; --nav-active-fg:#7C3AED;
    --nav-idle-fg: rgba(255,255,255,.82);
    --budget-bg: rgba(255,255,255,.16); --budget-border: rgba(255,255,255,.28);
    --budget-label:rgba(255,255,255,.85); --budget-sub:rgba(255,255,255,.8);
    --main-bg:#FAFAFB; --head-bg:#fff; --head-border:#EEECF6;
    --eyebrow:#7C3AED; --title:#1c1730;
    --pill1-bg:#F4F0FE; --pill1-fg:#6D28D9; --pill2-bg:#FFE9EA; --pill2-fg:#C2363B;
    --accent:#7C3AED; --accent-soft-bg:#F7F5FE; --accent-soft-border:#ECE8FA;
    --node-line:linear-gradient(#C9B6F5,#F5C6C8);
    --sub-text:#71717A; --note-fg:#52525B; --note-bg:#FAFAFA; --note-border:#EFEFF1;
    --shadow:0 30px 60px -32px rgba(124,58,237,.4),0 4px 16px rgba(0,0,0,.04);
  }
  .app.citrus{
    --side-bg: linear-gradient(180deg,#1A2E05,#3A2A09);
    --side-sub:#C9D9A8;
    --logo-color:#A3E635;
    --nav-active-bg:#A3E635; --nav-active-fg:#1A2E05;
    --nav-idle-fg:#BFD89A;
    --budget-bg:rgba(163,230,53,.12); --budget-border:rgba(163,230,53,.28);
    --budget-label:#A3E635; --budget-sub:#C9D9A8;
    --main-bg:#FAFAF7; --head-bg:#fff; --head-border:#EFEAD9;
    --eyebrow:#EA580C; --title:#1A2105;
    --pill1-bg:#FEF3C7; --pill1-fg:#92400E; --pill2-bg:#ECFCCB; --pill2-fg:#3F6212;
    --accent:#4D7C0F; --accent-soft-bg:#F2FBE3; --accent-soft-border:#DDEEC2;
    --node-line:linear-gradient(#BBDB8A,#F6C79A);
    --sub-text:#7A7568; --note-fg:#5C5A44; --note-bg:#FAFAF5; --note-border:#EFEADB;
    --shadow:0 30px 60px -32px rgba(249,115,22,.34),0 4px 16px rgba(0,0,0,.04);
  }

  .app{height:calc(100vh - 2rem);background:#fff;border-radius:16px;overflow:hidden;display:flex;border:1px solid #E4E4E7;box-shadow:var(--shadow);}

  .side{width:248px;background:var(--side-bg);color:#fff;padding:26px 18px;display:flex;flex-direction:column;flex-shrink:0;}
  .side .logo{display:flex;align-items:center;gap:9px;font:800 17px 'Sora';margin-bottom:3px;}
  .side .logo .ic{display:flex;color:var(--logo-color);}
  .side .dates{font:500 12px 'DM Sans';color:var(--side-sub);margin-bottom:24px;padding-left:1px;}
  .nav{display:flex;flex-direction:column;gap:4px;}
  .nav button{display:flex;align-items:center;gap:11px;border:none;cursor:pointer;text-align:left;padding:11px 13px;border-radius:9px;background:transparent;color:var(--nav-idle-fg);font:600 14px 'DM Sans';transition:.18s;}
  .nav button .ic{display:flex;}
  .nav button.on{background:var(--nav-active-bg);color:var(--nav-active-fg);}
  .spacer{flex:1;}
  .budget{background:var(--budget-bg);border:1px solid var(--budget-border);border-radius:12px;padding:15px;}
  .budget .k{font:600 10.5px 'DM Sans';letter-spacing:1px;text-transform:uppercase;color:var(--budget-label);}
  .budget .v{font:800 23px 'Sora';margin-top:4px;}
  .budget .s{font:500 12px 'DM Sans';color:var(--budget-sub);margin-top:2px;}

  /* theme toggle (in sidebar) */
  .theme-toggle{margin-bottom:12px;}
  .theme-toggle .tt-k{display:block;font:600 10.5px 'DM Sans';letter-spacing:1px;text-transform:uppercase;color:var(--budget-label);margin-bottom:8px;}
  .tt-switch{position:relative;display:flex;width:100%;background:var(--budget-bg);border:1px solid var(--budget-border);border-radius:10px;padding:4px;}
  .tt-knob{position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);background:var(--nav-active-bg);border-radius:7px;box-shadow:0 2px 6px rgba(0,0,0,.18);transition:transform .22s cubic-bezier(.4,0,.2,1);}
  .app.citrus .tt-knob{transform:translateX(100%);}
  .tt-opt{position:relative;z-index:1;flex:1;border:none;background:transparent;cursor:pointer;font:600 12.5px 'DM Sans';padding:7px 0;border-radius:7px;color:var(--nav-idle-fg);transition:color .18s;}
  .tt-opt.on{color:var(--nav-active-fg);}

  .main{flex:1;display:flex;flex-direction:column;background:var(--main-bg);min-width:0;}
  .head{padding:24px 28px 16px;background:var(--head-bg);border-bottom:1px solid var(--head-border);display:flex;align-items:flex-end;justify-content:space-between;}
  .head .eyebrow{font:700 11px 'DM Sans';letter-spacing:1.5px;text-transform:uppercase;color:var(--eyebrow);}
  .head .h1{font:800 26px 'Sora';color:var(--title);letter-spacing:-.5px;margin-top:2px;}
  .head .pills{display:flex;gap:7px;}
  .pill{font:600 12px 'DM Sans';padding:6px 12px;border-radius:8px;}
  .pill.a{background:var(--pill1-bg);color:var(--pill1-fg);}
  .pill.b{background:var(--pill2-bg);color:var(--pill2-fg);}

  .body{flex:1;overflow:auto;padding:22px 28px;}

  /* timeline (parcours + planning) */
  .row{display:flex;gap:16px;}
  .rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .node{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font:700 13px 'Sora';flex-shrink:0;}
  .line{flex:1;width:2px;margin:5px 0;min-height:12px;background:var(--node-line);}
  .card{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
  .chead{display:flex;align-items:flex-start;gap:10px;}
  .cicon{width:34px;height:34px;border-radius:9px;background:var(--accent-soft-bg);border:1px solid var(--accent-soft-border);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
  .ctag{font:700 10px 'DM Sans';letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);}
  .ctitle{font:700 16px 'Sora';color:#18181B;}
  .cmeta{font:700 14px 'Sora';color:var(--accent);white-space:nowrap;}
  .csub{font:500 12.5px 'DM Sans';color:var(--sub-text);}
  .cnote{font:500 12.5px 'DM Sans';color:var(--note-fg);background:var(--note-bg);border:1px solid var(--note-border);padding:8px 11px;border-radius:8px;}
  .badge{display:inline-flex;align-self:flex-start;align-items:center;gap:6px;font:600 11px 'DM Sans';padding:4px 10px;border-radius:999px;}
  .badge .d{width:6px;height:6px;border-radius:50%;}

  /* place list inside a day card */
  .plist{display:flex;flex-direction:column;gap:7px;margin-top:2px;}
  .pl{display:flex;align-items:center;gap:9px;}
  .pl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .pl-name{font:600 13px 'DM Sans';color:#27272A;flex:1;min-width:0;}
  .pl-meta{font:600 12px 'DM Sans';color:var(--sub-text);white-space:nowrap;}

  /* place grid */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  /* "tous les lieux" : cartes en flex-wrap, plafonnées à 300px */
  .lieux-grid{display:flex;flex-wrap:wrap;gap:12px;}
  .lieux-grid .fcard{flex:1 1 260px;max-width:300px;}
  .fcard{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .fhead{display:flex;align-items:flex-start;gap:12px;}
  .ficon{width:38px;height:38px;border-radius:9px;background:var(--accent-soft-bg);border:1px solid var(--accent-soft-border);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
  .ftitle{font:600 15px 'DM Sans';color:#18181B;}
  .fsub{font:500 12.5px 'DM Sans';color:var(--sub-text);margin-top:1px;}
  .fmeta{font:700 15px 'Sora';color:var(--accent);white-space:nowrap;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font:600 10.5px 'DM Sans';padding:3px 8px;border-radius:6px;background:var(--accent-soft-bg);color:var(--accent);border:1px solid var(--accent-soft-border);}

  /* thumbnails (Wikipedia REST) */
  .thumb{position:relative;display:block;overflow:hidden;flex-shrink:0;background:#ECECEF;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .45s ease;}
  .thumb.is-loaded img{opacity:1;}
  .thumb-fb{position:absolute;inset:0;display:none;align-items:center;justify-content:center;}
  .thumb.is-fallback .thumb-fb{display:flex;}
  .thumb:not(.is-loaded):not(.is-fallback)::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,#ECECEF 30%,#F5F5F7 50%,#ECECEF 70%);background-size:200% 100%;animation:shim 1.2s infinite;}
  @keyframes shim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .thumb.banner{width:100%;height:130px;}
  .thumb.sq{width:46px;height:46px;border-radius:10px;}
  .thumb.mini{width:30px;height:30px;border-radius:7px;}

  /* place card with photo banner */
  .fcard.media{padding:0;gap:0;overflow:hidden;}
  .fcard.media .fbody{padding:16px;display:flex;flex-direction:column;gap:10px;}

  /* section labels + filter bar */
  .seclabel{display:flex;align-items:baseline;gap:9px;font:800 16px 'Sora';color:var(--title);margin:0 0 13px;flex-wrap:wrap;}
  .seclabel:not(:first-child){margin-top:24px;}
  .seclabel .num{color:var(--accent);}
  .seclabel .pin{font:500 12px 'DM Sans';color:var(--sub-text);}
  .filterbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
  .filterbar button{border:1px solid var(--head-border);background:#fff;color:var(--sub-text);font:600 12.5px 'DM Sans';padding:7px 13px;border-radius:8px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:7px;}
  .filterbar button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .filterbar .fdot{width:8px;height:8px;border-radius:50%;}

  /* advice (conseils) */
  .advice{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:14px 15px;display:flex;gap:12px;align-items:flex-start;}
  .advice-ic{width:34px;height:34px;border-radius:9px;background:var(--accent-soft-bg);border:1px solid var(--accent-soft-border);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
  .advice-tx{font:500 13px 'DM Sans';color:var(--note-fg);line-height:1.5;}

  /* parcours : transition transport (train Z3) */
  .node.transit{border-radius:9px;background:var(--accent);color:#fff;border:none;}
  .card.transit{background:var(--accent-soft-bg);border-style:dashed;border-color:var(--accent-soft-border);}

  /* parcours : accordéon villes → jours → planning */
  .city-card{cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .city-card:hover{border-color:var(--accent-soft-border);box-shadow:0 8px 22px -14px rgba(0,0,0,.25);}
  .caret{display:flex;align-items:center;color:var(--sub-text);flex-shrink:0;transition:transform .2s;}
  .caret.open{transform:rotate(180deg);}
  .subwrap{margin-top:12px;padding-left:14px;border-left:2px dashed var(--accent-soft-border);}
  .day-cards{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;padding:6px 0 4px;}
  .tarot{width:174px;flex:0 0 174px;cursor:pointer;position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid rgba(22,22,55,.07);border-radius:14px;padding:11px;box-shadow:0 10px 26px -16px rgba(40,40,80,.35);transition:transform .22s ease,box-shadow .22s ease;}
  .tarot:hover{transform:translateY(-5px);box-shadow:0 20px 34px -16px rgba(40,40,80,.4),0 0 16px -7px var(--tarot-accent,#7C3AED);}
  .tarot.on{transform:translateY(-7px);box-shadow:0 22px 40px -16px rgba(40,40,80,.45),0 0 20px -6px var(--tarot-accent,#7C3AED),0 0 0 1.5px var(--tarot-accent,#7C3AED);}
  .tarot-frame{--ta:var(--tarot-accent,#7C3AED);position:relative;z-index:1;flex:1;border-radius:9px;padding:11px 10px 12px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(var(--ta),var(--ta)) left top,linear-gradient(var(--ta),var(--ta)) left top,linear-gradient(var(--ta),var(--ta)) right top,linear-gradient(var(--ta),var(--ta)) right top,linear-gradient(var(--ta),var(--ta)) left bottom,linear-gradient(var(--ta),var(--ta)) left bottom,linear-gradient(var(--ta),var(--ta)) right bottom,linear-gradient(var(--ta),var(--ta)) right bottom;background-repeat:no-repeat;background-size:16px 2px,2px 16px,16px 2px,2px 16px,16px 2px,2px 16px,16px 2px,2px 16px;}
  .tarot-num{text-align:center;font:700 17px 'Cinzel',serif;letter-spacing:3px;color:#241B3A;padding-top:2px;}
  .tarot-flourish{width:36px;height:2px;margin:1px auto 2px;border-radius:2px;background:var(--tarot-accent,#7C3AED);box-shadow:0 0 8px -1px var(--tarot-accent,#7C3AED);}
  .tarot-art{position:relative;height:150px;border-radius:6px;overflow:hidden;border:1px solid rgba(22,22,55,.10);}
  .tarot-art .thumb{width:100%;height:100%;}
  .tarot-name{text-align:center;font:700 9.5px 'Sora';letter-spacing:1.2px;text-transform:uppercase;color:#2A2342;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:27px;}
  .tarot-meta{text-align:center;font:600 8.5px 'DM Sans';letter-spacing:1px;text-transform:uppercase;color:#8A86A0;}
  .day-detail{margin-top:14px;border-radius:12px;padding:15px 16px;}
  .day-detail-head{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
  .dd-jx{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:30px;padding:0 9px;border-radius:8px;color:#fff;font:800 13px 'Sora';flex-shrink:0;}
  .dd-title{font:800 15px 'Sora';color:var(--title);}
  .dd-sub{font:500 12px 'DM Sans';color:var(--sub-text);margin-top:1px;}
  .subplan{display:flex;flex-direction:column;gap:9px;}
  .pl-name2{flex:1;min-width:0;}
  .pl-n{font:600 13px 'DM Sans';color:#27272A;}
  .pl-z{font:500 11.5px 'DM Sans';color:var(--sub-text);margin-top:1px;}

  /* nourriture */
  .food-intro{font:500 13px 'DM Sans';color:var(--sub-text);margin-bottom:18px;line-height:1.5;}
  .food-intro .star{color:#F59E0B;font-weight:700;}
  .chip.perso{background:#FEF3C7;color:#B45309;border-color:#FCE7A8;}

  @media (max-width:760px){
    body{padding:0;}
    .app{height:auto;min-height:100vh;border-radius:0;border:none;flex-direction:column;}
    .side{width:100%;}
    .nav{flex-direction:row;flex-wrap:wrap;}
    .nav button{flex:1;justify-content:center;}
    .spacer{display:none;}
    .budget{margin-top:18px;}
    .head{flex-direction:column;align-items:flex-start;gap:10px;}
    .grid2{grid-template-columns:1fr;}
    .body{max-height:none;}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="side">
    <div class="logo"><span class="ic" id="logoIcon"></span><span id="logoText">Sinarum</span></div>
    <div class="dates" id="sideDates">Chine · 26 juil → 6 août</div>
    <nav class="nav" id="nav"></nav>
    <div class="spacer"></div>
    <div class="theme-toggle">
      <span class="tt-k">Thème</span>
      <div class="tt-switch" role="group" aria-label="Choix du thème">
        <span class="tt-knob" aria-hidden="true"></span>
        <button class="tt-opt on" data-theme="aurora">Aurora</button>
        <button class="tt-opt" data-theme="citrus">Citrus</button>
      </div>
    </div>
    <div class="budget">
      <div class="k">Le voyage</div>
      <div class="v" id="statValue">12 jours</div>
      <div class="s" id="statSub">4 villes · 50 lieux</div>
    </div>
  </aside>

  <section class="main">
    <header class="head">
      <div>
        <div class="eyebrow" id="eyebrow">Itinéraire</div>
        <div class="h1">Voyage en Chine</div>
      </div>
      <div class="pills">
        <span class="pill a" id="pillA">12 jours</span>
        <span class="pill b" id="pillB">4 villes</span>
      </div>
    </header>
    <div class="body om-scroll" id="body"></div>
  </section>
</div>

<script type="module">
import { tripData, flexibleItinerary, ROUTE_ORDER, interCityTransport, foodData } from './js/data.js';
import { getImage } from './js/images.js';

// ---------- icons ----------
const ICONS = {

  compass:[['circle',{cx:12,cy:12,r:10}],['polygon',{points:'16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76'}]],
  bulb:[['path',{d:'M15 14c.2-1 .7-1.7 1.5-2.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.8.8 1.3 1.5 1.5 2.5'}],['path',{d:'M9 18h6'}],['path',{d:'M10 22h4'}]],
  leaf:[['path',{d:'M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z'}],['path',{d:'M2 21c0-3 1.85-5.36 5.08-6'}]],
  calendar:[['rect',{x:3,y:4,width:18,height:18,rx:2}],['path',{d:'M16 2v4M8 2v4M3 10h18'}]],
  train:[['rect',{x:4,y:3,width:16,height:16,rx:2}],['path',{d:'M4 11h16'}],['path',{d:'M12 3v8'}],['path',{d:'m8 19-2 3'}],['path',{d:'m18 22-2-3'}],['path',{d:'M8 15h.01M16 15h.01'}]],
  chevron:[['path',{d:'m6 9 6 6 6-6'}]],
};
const SVGNS = 'http://www.w3.org/2000/svg';
function icon(name, size){
  size = size || 18;
  const svg = document.createElementNS(SVGNS,'svg');
  svg.setAttribute('width',size); svg.setAttribute('height',size);
  svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
  svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','1.75');
  svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
  (ICONS[name]||[]).forEach(d=>{
    const el = document.createElementNS(SVGNS,d[0]);
    for(const k in d[1]) el.setAttribute(k, d[1][k]);
    svg.appendChild(el);
  });
  return svg;
}

// ---------- derived data ----------
const cities = tripData.itineraireData;
const cityByName = Object.fromEntries(cities.map(c => [c.ville, c]));

const TRIP = {
  villes: ROUTE_ORDER.length,
  lieux: cities.reduce((n,c)=> n + c.masterListe.length, 0),
  jours: ROUTE_ORDER.reduce((n,v)=> n + (flexibleItinerary[v]||[]).length, 0),
  incont: cities.reduce((n,c)=> n + c.masterListe.filter(p=>p.incontournable).length, 0),
};
const FOOD_COUNT = foodData.reduce((n,g)=> n + g.plats.length, 0);

const firstDate = flexibleItinerary[ROUTE_ORDER[0]][0].date;
const lastCityDays = flexibleItinerary[ROUTE_ORDER[ROUTE_ORDER.length-1]];
const lastDate = lastCityDays[lastCityDays.length-1].date;

const CITY_ICON = { 'Chengdu':'leaf', 'Zhangjiajie':'mountain', 'Chongqing':'building', 'Pékin':'landmark' };
const ROMAN = ['I','II','III','IV','V','VI'];

const TAG_LABELS = {
  unesco:'UNESCO', tradition:'Tradition', modern:'Moderne', nature:'Nature',
  food:'Cuisine', show:'Spectacle', night:'Nuit', temple:'Temple',
  shopping:'Shopping', cable:'Téléphérique', photo:'Photo', view:'Panorama', panda:'Panda',
};
const TAG_ICON_ORDER = ['panda','unesco','temple','nature','view','cable','show','food','night','shopping','modern','tradition','photo'];
const TAG_ICON = {
  panda:'leaf', unesco:'landmark', temple:'landmark', nature:'leaf', view:'mountain',
  cable:'mountain', show:'ticket', food:'utensils', night:'flame', shopping:'card',
  modern:'building', tradition:'coffee', photo:'map',
};
function placeIcon(p){
  for(const t of TAG_ICON_ORDER){ if(p.tags && p.tags.includes(t)) return TAG_ICON[t]; }
  return 'pin';
}

// ---------- helpers ----------
function el(tag, cls, txt){
  const n = document.createElement(tag);
  if(cls) n.className = cls;
  if(txt != null) n.textContent = txt;
  return n;
}
function hexA(hex, a){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function shortDate(s){
  return s.replace(/^[A-Za-zÀ-ÿ]+\.\s*/,'').replace('juillet','juil.');
}
function tintIcon(node, colour){
  node.style.color = colour;
  node.style.background = hexA(colour,.10);
  node.style.borderColor = hexA(colour,.25);
}
function secLabel(num, name, pin){
  const s = el('div','seclabel');
  s.appendChild(el('span','num', num + '.'));
  s.appendChild(el('span', null, name));
  if(pin) s.appendChild(el('span','pin', pin));
  return s;
}
function toRoman(n){
  const t = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];
  return t[n] || String(n);
}
/* Vignette Wikipedia (via images.js) avec repli icône + shimmer de chargement. */
function thumb(wikiTitle, size, fallbackIcon, colour){
  const wrap = el('span', 'thumb ' + (size || ''));
  const img = el('img'); img.loading = 'lazy'; img.alt = '';
  wrap.appendChild(img);
  if(fallbackIcon){
    const fb = el('span','thumb-fb');
    if(colour){ fb.style.background = hexA(colour,.12); fb.style.color = colour; }
    fb.appendChild(icon(fallbackIcon, size === 'mini' ? 15 : 20));
    wrap.appendChild(fb);
  }
  getImage(wikiTitle).then(url=>{
    if(url){
      img.src = url;
      img.addEventListener('load', ()=> wrap.classList.add('is-loaded'), { once:true });
    } else {
      wrap.classList.add('is-fallback');
    }
  });
  return wrap;
}

// ---------- config ----------
const TABS = [
  { key:'parcours', label:'Parcours',      icon:'compass'  },
  { key:'planning', label:'Jour par jour', icon:'calendar' },
  { key:'lieux',    label:'Tous les lieux',icon:'pin'      },
  { key:'food',     label:'Nourriture',    icon:'utensils' },
  { key:'conseils', label:'Conseils',      icon:'bulb'     },
];
const EYEBROWS = {
  parcours:'Itinéraire · ' + TRIP.villes + ' villes',
  planning:'Planning · ' + TRIP.jours + ' jours',
  lieux:'Tous les lieux',
  food:'Nourriture · ' + FOOD_COUNT + ' plats',
  conseils:'Conseils logistiques',
};

// ---------- state ----------
const state = { theme:'aurora', tab:'parcours', lieuxCity:'Toutes', openCity:ROUTE_ORDER[0], openDay:null };

// ---------- render: nav ----------
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  TABS.forEach(t=>{
    const b = el('button', t.key === state.tab ? 'on' : '');
    const ic = el('span','ic'); ic.appendChild(icon(t.icon,16));
    b.appendChild(ic);
    b.appendChild(el('span', null, t.label));
    b.onclick = ()=>{ state.tab = t.key; render(); };
    nav.appendChild(b);
  });
}

// ---------- render: parcours (villes → jours → planning, interactif) ----------
function renderParcours(body){
  ROUTE_ORDER.forEach((ville, i)=>{
    const city = cityByName[ville];
    const days = flexibleItinerary[ville] || [];
    const byId = new Map(city.masterListe.map(p=>[p.id, p]));
    const last = i === ROUTE_ORDER.length - 1;
    const cityOpen = state.openCity === ville;

    const row = el('div','row');
    const rail = el('div','rail'); rail.style.width = '30px';
    const node = el('div','node', String(i+1));
    node.style.borderColor = city.couleur; node.style.color = city.couleur;
    if(cityOpen){ node.style.background = city.couleur; node.style.color = '#fff'; }
    rail.appendChild(node);
    if(!last) rail.appendChild(el('div','line'));
    row.appendChild(rail);

    const wrap = el('div'); wrap.style.flex='1'; wrap.style.minWidth='0'; wrap.style.paddingBottom='16px';

    // --- carte ville (cliquable) ---
    const card = el('div','card city-card');
    card.onclick = ()=>{ state.openCity = cityOpen ? null : ville; state.openDay = null; render(); };

    const head = el('div','chead');
    const ci = thumb(city.wikiTitle, 'sq', CITY_ICON[ville]||'pin', city.couleur);
    ci.style.boxShadow = '0 0 0 2px ' + hexA(city.couleur,.35);
    head.appendChild(ci);
    const mid = el('div'); mid.style.flex='1'; mid.style.minWidth='0';
    const tag = el('div','ctag','Étape ' + (i+1)); tag.style.color = city.couleur;
    mid.appendChild(tag);
    mid.appendChild(el('div','ctitle', ville));
    mid.appendChild(el('div','fsub', city.pinyin));
    head.appendChild(mid);
    const meta = el('div','cmeta', days.length + ' j'); meta.style.color = city.couleur;
    head.appendChild(meta);
    const car = el('span','caret' + (cityOpen ? ' open' : '')); car.appendChild(icon('chevron',16));
    head.appendChild(car);
    card.appendChild(head);

    if(days.length){
      card.appendChild(el('div','csub', shortDate(days[0].date) + ' → ' + shortDate(days[days.length-1].date)));
    }
    if(!cityOpen){
      const inc = city.masterListe.filter(p=>p.incontournable).map(p=>p.nom);
      if(inc.length) card.appendChild(el('div','cnote','À ne pas manquer · ' + inc.join(' · ')));
    }
    wrap.appendChild(card);

    // --- jours en rangée de cartes (façon tarot) ---
    if(cityOpen){
      const sub = el('div','subwrap'); sub.style.borderColor = hexA(city.couleur,.30);
      const cardsRow = el('div','day-cards');
      let selIdx = -1;
      days.forEach((day, di)=>{
        const dayKey = ville + '#' + di;
        const dayOpen = state.openDay === dayKey;
        if(dayOpen) selIdx = di;
        const ids = day.placeIds || [];
        const firstPlace = ids.length ? byId.get(ids[0]) : null;

        const dayNo = parseInt(day.day.replace(/\D/g,''), 10) || (di + 1);
        const tc = el('div','tarot' + (dayOpen ? ' on' : ''));
        tc.style.setProperty('--tarot-accent', city.couleur);
        tc.style.background = 'linear-gradient(155deg,#FFFFFF 0%,' + hexA(city.couleur,.07) + ' 55%,' + hexA(city.couleur,.16) + ' 100%)';
        tc.onclick = ()=>{ state.openDay = dayOpen ? null : dayKey; render(); };

        const frame = el('div','tarot-frame');
        frame.appendChild(el('div','tarot-num', toRoman(dayNo)));
        frame.appendChild(el('div','tarot-flourish'));
        const art = el('div','tarot-art');
        art.appendChild(thumb((firstPlace && firstPlace.wikiTitle) || city.wikiTitle, '', firstPlace ? placeIcon(firstPlace) : 'calendar', city.couleur));
        frame.appendChild(art);
        frame.appendChild(el('div','tarot-name', day.subtitle));
        const nLieux = ids.length ? (ids.length + ' lieu' + (ids.length > 1 ? 'x' : '')) : 'Transfert';
        frame.appendChild(el('div','tarot-meta', shortDate(day.date) + ' · ' + nLieux));
        tc.appendChild(frame);

        cardsRow.appendChild(tc);
      });
      sub.appendChild(cardsRow);

      // --- exploration de la journée choisie ---
      if(selIdx >= 0){
        const day = days[selIdx];
        const ids = day.placeIds || [];
        const detail = el('div','day-detail');
        detail.style.background = hexA(city.couleur,.06);
        detail.style.border = '1px solid ' + hexA(city.couleur,.22);

        const dh = el('div','day-detail-head');
        const ddjx = el('span','dd-jx', day.day.replace('Jour ','J')); ddjx.style.background = city.couleur;
        dh.appendChild(ddjx);
        const dhb = el('div'); dhb.style.minWidth = '0';
        dhb.appendChild(el('div','dd-title', day.subtitle));
        dhb.appendChild(el('div','dd-sub', shortDate(day.date) + ' · ' + (ids.length ? ids.length + ' lieux à explorer' : 'journée de transfert')));
        dh.appendChild(dhb);
        detail.appendChild(dh);

        if(ids.length){
          const plan = el('div','subplan');
          ids.forEach(id=>{
            const p = byId.get(id); if(!p) return;
            const r = el('div','pl');
            const t = thumb(p.wikiTitle || city.wikiTitle, 'mini', placeIcon(p), city.couleur);
            t.style.boxShadow = '0 0 0 1.5px ' + hexA(city.couleur,.30);
            r.appendChild(t);
            const nm = el('div','pl-name2');
            nm.appendChild(el('div','pl-n', p.nom));
            nm.appendChild(el('div','pl-z', p.zone + ' · ' + p.temps));
            r.appendChild(nm);
            r.appendChild(el('span','pl-meta','★ ' + p.note));
            plan.appendChild(r);
          });
          detail.appendChild(plan);
        } else {
          const note = el('div','cnote'); note.style.margin='0'; note.style.display='flex'; note.style.alignItems='center'; note.style.gap='8px';
          const ic = icon('plane',15); ic.style.color = city.couleur; ic.style.flexShrink='0';
          note.appendChild(ic); note.appendChild(document.createTextNode(day.subtitle));
          detail.appendChild(note);
        }
        sub.appendChild(detail);
      }
      wrap.appendChild(sub);
    }

    row.appendChild(wrap); body.appendChild(row);

    // --- transition train de nuit Z3, entre Chongqing et Pékin ---
    if(ville === 'Chongqing'){
      const z3 = interCityTransport.find(t => /Z3/.test(t.mode) || t.trajet === 'Chongqing → Pékin');
      if(z3) body.appendChild(transitRow(z3));
    }
  });
}

// ---------- render: transition transport (Z3) ----------
function transitRow(t){
  const row = el('div','row');
  const rail = el('div','rail'); rail.style.width = '30px';
  const node = el('div','node transit'); node.appendChild(icon('train',17));
  rail.appendChild(node);
  rail.appendChild(el('div','line'));
  row.appendChild(rail);

  const wrap = el('div'); wrap.style.flex='1'; wrap.style.minWidth='0'; wrap.style.paddingBottom='16px';
  const card = el('div','card transit');

  const head = el('div','chead'); head.style.justifyContent='space-between';
  const left = el('div'); left.style.flex='1'; left.style.minWidth='0';
  left.appendChild(el('div','ctag','Transition · nuit'));
  left.appendChild(el('div','ctitle', t.mode));
  head.appendChild(left);
  head.appendChild(el('div','cmeta', t.prix));
  card.appendChild(head);

  card.appendChild(el('div','csub', t.trajet + ' · ' + t.detail));

  if(t.statut){
    const badge = el('div','badge'); badge.style.background = '#FEF3C7'; badge.style.color = '#B45309';
    const d = el('span','d'); d.style.background = '#B45309'; badge.appendChild(d);
    badge.appendChild(document.createTextNode(t.statut));
    card.appendChild(badge);
  }
  if(t.planB) card.appendChild(el('div','cnote','Plan B · ' + t.planB));

  wrap.appendChild(card); row.appendChild(wrap);
  return row;
}

// ---------- render: planning (day by day) ----------
function renderPlanning(body){
  let dayNum = 0;
  const lastCity = ROUTE_ORDER[ROUTE_ORDER.length-1];
  ROUTE_ORDER.forEach((ville)=>{
    const city = cityByName[ville];
    const byId = new Map(city.masterListe.map(p=>[p.id, p]));
    const days = flexibleItinerary[ville] || [];
    days.forEach((day, idx)=>{
      dayNum++;
      const globalLast = (ville === lastCity) && (idx === days.length-1);

      const row = el('div','row');
      const rail = el('div','rail'); rail.style.width='30px';
      const node = el('div','node', String(dayNum));
      node.style.borderColor = city.couleur; node.style.color = city.couleur;
      rail.appendChild(node);
      if(!globalLast) rail.appendChild(el('div','line'));
      row.appendChild(rail);

      const wrap = el('div'); wrap.style.flex='1'; wrap.style.minWidth='0'; wrap.style.paddingBottom='16px';
      const card = el('div','card');

      const head = el('div','chead'); head.style.justifyContent='space-between';
      const left = el('div'); left.style.flex='1'; left.style.minWidth='0';
      const tag = el('div','ctag', ville.toUpperCase() + ' · ' + shortDate(day.date)); tag.style.color = city.couleur;
      left.appendChild(tag);
      left.appendChild(el('div','ctitle', day.subtitle));
      head.appendChild(left);
      const meta = el('div','cmeta', day.day); meta.style.color = city.couleur; meta.style.font = "700 13px 'Sora'";
      head.appendChild(meta);
      card.appendChild(head);

      const ids = day.placeIds || [];
      if(ids.length){
        const pl = el('div','plist');
        ids.forEach(id=>{
          const p = byId.get(id); if(!p) return;
          const r = el('div','pl');
          const t = thumb(p.wikiTitle || city.wikiTitle, 'mini', placeIcon(p), city.couleur);
          t.style.boxShadow = '0 0 0 1.5px ' + hexA(city.couleur,.30);
          r.appendChild(t);
          r.appendChild(el('span','pl-name', p.nom));
          r.appendChild(el('span','pl-meta','★ ' + p.note));
          pl.appendChild(r);
        });
        card.appendChild(pl);
      } else {
        const note = el('div','cnote'); note.style.display='flex'; note.style.alignItems='center'; note.style.gap='8px';
        const ic = icon('plane',16); ic.style.color = city.couleur; ic.style.flexShrink='0';
        note.appendChild(ic);
        note.appendChild(document.createTextNode(day.subtitle));
        card.appendChild(note);
      }

      wrap.appendChild(card); row.appendChild(wrap); body.appendChild(row);
    });
  });
}

// ---------- render: lieux (all places, filterable) ----------
function placeCard(p, city){
  const c = el('div','fcard media');
  c.appendChild(thumb(p.wikiTitle || city.wikiTitle, 'banner', placeIcon(p), city.couleur));

  const body = el('div','fbody');
  const head = el('div','fhead');
  const mid = el('div'); mid.style.flex='1'; mid.style.minWidth='0';
  mid.appendChild(el('div','ftitle', p.nom));
  mid.appendChild(el('div','fsub', p.pinyin));
  head.appendChild(mid);
  const meta = el('div','fmeta','★ ' + p.note); meta.style.color = city.couleur;
  head.appendChild(meta);
  body.appendChild(head);

  body.appendChild(el('div','fsub', p.zone + ' · ' + p.temps));

  if(p.tags && p.tags.length){
    const tg = el('div','tags');
    p.tags.forEach(t=> tg.appendChild(el('span','chip', TAG_LABELS[t] || t)));
    body.appendChild(tg);
  }
  if(p.conseil) body.appendChild(el('div','cnote', p.conseil.split('\n')[0]));

  if(p.incontournable){
    const b = el('div','badge'); b.style.background='#DCFCE7'; b.style.color='#15803D';
    const d = el('span','d'); d.style.background='#15803D'; b.appendChild(d);
    b.appendChild(document.createTextNode('Incontournable'));
    body.appendChild(b);
  }
  c.appendChild(body);
  return c;
}
function renderLieux(body){
  const bar = el('div','filterbar');
  ['Toutes', ...ROUTE_ORDER].forEach(v=>{
    const b = el('button', v === state.lieuxCity ? 'on' : '');
    if(v !== 'Toutes'){
      const dot = el('span','fdot'); dot.style.background = cityByName[v].couleur; b.appendChild(dot);
    }
    b.appendChild(document.createTextNode(v));
    b.onclick = ()=>{ state.lieuxCity = v; render(); };
    bar.appendChild(b);
  });
  body.appendChild(bar);

  const target = state.lieuxCity === 'Toutes' ? ROUTE_ORDER : [state.lieuxCity];
  target.forEach((ville)=>{
    const i = ROUTE_ORDER.indexOf(ville);
    const city = cityByName[ville];
    body.appendChild(secLabel(ROMAN[i], ville, city.pinyin));
    const g = el('div','lieux-grid');
    city.masterListe.forEach(p=> g.appendChild(placeCard(p, city)));
    body.appendChild(g);
  });
}

// ---------- render: conseils ----------
function renderConseils(body){
  ROUTE_ORDER.forEach((ville, i)=>{
    const city = cityByName[ville];
    const list = city.conseilsLogistiques || [];
    if(!list.length) return;
    body.appendChild(secLabel(ROMAN[i], ville, city.pinyin));
    const g = el('div','grid2');
    list.forEach(tx=>{
      const a = el('div','advice');
      const ic = el('div','advice-ic'); tintIcon(ic, city.couleur); ic.appendChild(icon('bulb',18));
      a.appendChild(ic);
      a.appendChild(el('div','advice-tx', tx));
      g.appendChild(a);
    });
    body.appendChild(g);
  });
}

// ---------- render: nourriture ----------
function foodCard(plat, colour, regionLabel){
  const c = el('div','fcard media');
  c.appendChild(thumb(plat.wikiTitle, 'banner', 'utensils', colour));
  const body = el('div','fbody');
  const head = el('div','fhead');
  const mid = el('div'); mid.style.flex='1'; mid.style.minWidth='0';
  mid.appendChild(el('div','ftitle', plat.nom));
  mid.appendChild(el('div','fsub', plat.pinyin));
  head.appendChild(mid);
  if(plat.perso){ const star = el('div','fmeta','★'); star.style.color = '#F59E0B'; star.title = 'Coup de cœur'; head.appendChild(star); }
  body.appendChild(head);
  if(regionLabel){ const tg = el('div','tags'); tg.appendChild(el('span','chip', regionLabel)); body.appendChild(tg); }
  if(plat.desc) body.appendChild(el('div','cnote', plat.desc));
  c.appendChild(body);
  return c;
}
function renderFood(body){
  const intro = el('div','food-intro');
  intro.appendChild(el('span','star','★'));
  intro.appendChild(document.createTextNode(' mes coups de cœur — la pastille indique où déguster chaque plat. ' + FOOD_COUNT + ' plats au menu.'));
  body.appendChild(intro);

  foodData.forEach((group, i)=>{
    const city = cityByName[group.ville];
    const colour = city ? city.couleur : '#64748B';
    body.appendChild(secLabel(ROMAN[i], group.ville, group.meta));
    const g = el('div','lieux-grid');
    group.plats.forEach(plat=>{
      const regionLabel = city ? group.ville : (plat.region || 'Bonus');
      g.appendChild(foodCard(plat, colour, regionLabel));
    });
    body.appendChild(g);
  });
}

// ---------- render: body dispatch ----------
function renderBody(){
  const body = document.getElementById('body');
  body.innerHTML = '';
  if(state.tab === 'parcours')      renderParcours(body);
  else if(state.tab === 'planning') renderPlanning(body);
  else if(state.tab === 'lieux')    renderLieux(body);
  else if(state.tab === 'food')     renderFood(body);
  else if(state.tab === 'conseils') renderConseils(body);
}

// ---------- render: shell ----------
function render(){
  const app = document.getElementById('app');
  app.className = 'app' + (state.theme === 'citrus' ? ' citrus' : '');

  document.querySelectorAll('.tt-opt').forEach(o=> o.classList.toggle('on', o.dataset.theme === state.theme));
  document.getElementById('logoText').textContent = state.theme === 'citrus' ? 'Itinéraire' : 'Sinarum';
  const li = document.getElementById('logoIcon'); li.innerHTML = '';
  li.appendChild(icon(state.theme === 'citrus' ? 'leaf' : 'compass', 17));

  document.getElementById('eyebrow').textContent = EYEBROWS[state.tab];
  document.getElementById('pillA').textContent = TRIP.jours + ' jours';
  document.getElementById('pillB').textContent = TRIP.villes + ' villes';
  document.getElementById('sideDates').textContent = 'Chine · ' + shortDate(firstDate) + ' → ' + shortDate(lastDate);
  document.getElementById('statValue').textContent = TRIP.jours + ' jours';
  document.getElementById('statSub').textContent = TRIP.villes + ' villes · ' + TRIP.lieux + ' lieux · ' + TRIP.incont + ' incontournables';

  renderNav();
  renderBody();
}

// ---------- theme switcher ----------
document.querySelectorAll('.tt-opt').forEach(b=>{
  b.onclick = ()=>{ state.theme = b.dataset.theme; render(); };
});

render();
